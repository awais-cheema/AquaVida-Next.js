slug: pool-design
accentColor: '#1a535c'
accentRgb: 26,83,92
heroLabel: High-Fidelity Design — AquaVida Studio
heroTitle: Concept.
heroHighlight: Blueprint.
heroBody:
  - type: paragraph
    children:
      - text: >-
          Vision before construction. We provide world-class architectural 
          design services that translate your aspirations into precise, 
          high-fidelity liquid landscapes — ensuring Every detail is refined 
          before the first groundbreaking.
heroImage: pool_design_hero.avif
overviewTitle: The Architectural Vision
overviewBody:
  - type: paragraph
    children:
      - text: >-
          At AquaVida, we view pool design as a discipline of precision. Our 
          studio provides complete architectural services, from site-specific 
          master planning to ultra-detailed technical blueprints. We utilize 
          advanced 3D modeling and photorealistic rendering to help you 
          visualize the interaction of light, water, and stone. Our goal is 
          to remove the variables from construction, providing a clear roadmap 
          for an iconic build that integrates seamlessly with your home’s architecture.
overviewImage: pool_design_overview.avif
processTitle: The Creative Workflow
processSteps:
  - title: Site Discovery & Data Capture
    body:
      - type: paragraph
        children:
          - text: >-
              We begin with a thorough site analysis, capturing topography, 
              light angles, and architectural context. We listen to your 
              narrative to understand how you want to live and entertain in 
              the space.
  - title: High-Fidelity Conceptualization
    body:
      - type: paragraph
        children:
          - text: >-
              Our designers move into 3D modeling, exploring geometries and 
              material palettes. We provide you with realistic renderings and 
              spatial walkthroughs, allowing you to refine Every detail of the 
              visual journey.
  - title: Technical Blueprinting
    body:
      - type: paragraph
        children:
          - text: >-
              Once the vision is locked, we produce detailed engineering 
              plans — from hydraulic schematics to masonry specs. We provide 
              a complete technical package ready for procurement and 
              construction phases.
investmentTitle: Engineering the Future
investmentBody: >-
  Premier design is the foundation of a successful estate. By investing in 
  technical design upfront, you eliminate costly mid-build changes and ensure 
  that Every component — from the vanishing edge to the hidden utilities — is 
  optimized for both aesthetics and performance. In Dallas, architectural design 
  is the key differentiator for trophy-class properties.
investmentImage: pool_design_investment.avif
servicesTitle: Design Studio Solutions
servicesItems:
  - title: 3D Visual Walkthroughs
    body:
      - type: paragraph
        children:
          - text: >-
              Photorealistic models of your project, allowing you to see 
              exactly how light shifts across the water and how the materials 
              interact at different times of day.
  - title: Technical Master Planning
    body:
      - type: paragraph
        children:
          - text: >-
              Full-site architectural services that integrate the pool, 
              landscaping, fire features, and kitchens into a unified, coherent 
              vision.
  - title: Material Curation
    body:
      - type: paragraph
        children:
          - text: >-
              We source and sample unique stones, finishes, and technical 
              equipment directly from global suppliers, curating a bespoke 
              palette for your project.
featuresTitle: Studio Design Excellence
features:
  - title: Photorealistic Rendering
    body:
      - type: paragraph
        children:
          - text: >-
              Our visualizations use advanced lighting and material physics to 
              ensure that the "digital preview" matches the "built reality" 
              with absolute fidelity.
  - title: Integrated Structural Engineering
    body:
      - type: paragraph
        children:
          - text: >-
              Design isn't just about looks. We integrate preliminary 
              structural engineering into Every design to ensure that what we 
              visualize can be built to last in Dallas soil.
  - title: Hydraulic Precision
    body:
      - type: paragraph
        children:
          - text: >-
              Every design includes technical layouts for water flow and 
              filtration, ensuring that your pool operates as beautifully as 
              it looks.
  - title: Material Feasibility
    body:
      - type: paragraph
        children:
          - text: >-
              We cross-check Every material selection against technical 
              performance data, ensuring that your stone and tile can 
              withstand the environment.
  - title: Landscape Synergy
    body:
      - type: paragraph
        children:
          - text: >-
              Our designs include planting and softscape plans that 
              complement the hardscape and provide natural privacy and 
              architectural scale.
  - title: Permitting & Code Compliance
    body:
      - type: paragraph
        children:
          - text: >-
              We design with local Dallas codes in mind, preparing your 
              project for a smooth transition from the drawing board to the 
              job site.
standardsTitle: Standards of Vision
standards:
  - title: Iterative Design Support
    body:
      - type: paragraph
        children:
          - text: >-
              We work closely with you through Every revision, ensuring that 
              the final design is a perfect reflection of your personal 
              aesthetic and lifestyle needs.
  - title: Handoff & Technical Briefing
    body:
      - type: paragraph
        children:
          - text: >-
              Once the design is complete, we provide a full handoff 
              briefing to your construction team, ensuring the vision is 
              translated to the site without loss of detail.
ctaTitle: Begin the Architecture of Water
ctaBody: >-
  Connect with our studio to discuss your project. Our designers will 
  provide an initial consultation to explore your site’s potential and 
  architectural vision.
ctaImage: pool_design_cta.avif
