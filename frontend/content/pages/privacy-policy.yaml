effectiveDate: January 1, 2026
intro: "AquaVida Pools and Spas' Privacy Policy details how it collects, uses and safeguards personal information provided to us from visitors and clients of AquaVida Pools and Spas. By engaging our services, you agree to the data practices described."
sections:
  - heading: Data Collection at the Source
    body: >-
      We collect personal and project-specific information to ensure precise execution and tailored service. This includes standard contact details, property data, site specifications, and financial information necessary for project initiation and management. Additionally, analytical data concerning your interaction with our digital platforms is collected to refine our user experience.
    items: []
  - heading: Strategic Application of Data
    body: >-
      The information we gather is instrumental in executing your project. It enables us to coordinate consultations, construct accurate estimates, and manage all phases of construction. Furthermore, we utilize this data to communicate essential project updates, process transactions, and fulfill legal or regulatory obligations inherent in construction management.
    items: []
  - heading: Information Sharing Protocols
    body: >-
      Your data is shared exclusively with necessary third parties involved in the execution of your project. This includes subcontractors, material suppliers, and relevant municipal permitting authorities. We also engage trusted service providers for operational functions such as payment processing and data hosting, ensuring they adhere to stringent confidentiality agreements.
    items: []
  - heading: Data Security Measures
    body: >-
      We implement robust security protocols to protect your information from unauthorized access or disclosure. This encompasses both digital encryption for electronic records and physical security measures for hardcopy documents, ensuring the integrity of your personal and financial data throughout the project lifecycle.
    items: []
  - heading: Client Data Rights
    body: >-
      We respect your right to oversee your personal information. You retain the ability to request access to the data we hold, request corrections to inaccuracies, or demand the deletion of your personal records, subject to constraints imposed by legal retention requirements or ongoing contractual obligations.
    items: []
  - heading: Modifications to This Policy
    body: >-
      AquaVida Pools and Spas reserves the right to modify this Privacy Policy as our operational practices or legal requirements evolve. Changes will be posted on our platform, and continued engagement with our services constitutes acceptance of the revised terms.
    items: []
