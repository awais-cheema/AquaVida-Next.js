slug: pavers
accentColor: '#9c6644'
accentRgb: 156,102,68
heroLabel: Hardscape Engineering — AquaVida Surfaces
heroTitle: Foundation.
heroHighlight: Form.
heroBody:
  - type: paragraph
    children:
      - text: >-
          The surface defines the journey. We engineer custom hardscape
          systems that combine structural stability with architectural elegance —
          transforming your estate's terrain into a curated landscape of
          textures and lines.
heroImage: pavers_hero.avif
overviewTitle: The Architecture of the Ground
overviewBody:
  - type: paragraph
    children:
      - text: >-
          At AquaVida, we view pavers as more than a walkway; they are a 
          structural foundation for your outdoor environment. Our hardscapes 
          are engineered to Dallas soil specifications, ensuring that every 
          stone remains level and every line remains crisp through years of 
          shifting and use. We source premium materials — from large-format 
          porcelain to natural travertine and custom-poured concrete — to create 
          surfaces that are as resilient as they are visually compelling.
overviewImage: pavers_overview.avif
processTitle: Constructing the Surface
processSteps:
  - title: Soil & Gradient Analysis
    body:
      - type: paragraph
        children:
          - text: >-
              We begin with a technical survey of your property’s drainage and 
              soil stability. We design sub-base layers that prevent shifting 
              in Dallas clay, ensuring the longevity of your investment.
  - title: Manual Selection & Patterning
    body:
      - type: paragraph
        children:
          - text: >-
              We work with you to select materials that complement the home’s 
              facade and the pool’s aesthetic. We design intricate patterns — 
              from minimalist grids to organic mosaics — that provide visual interest 
              and structural integrity.
  - title: Precision Laying & Sealing
    body:
      - type: paragraph
        children:
          - text: >-
              Our master masons hand-set every stone, ensuring millimeter-precise 
              spacing and level surfaces. We finish every project with 
              high-performance sealants that protect the material and enhance its 
              natural color.
investmentTitle: Building Lasting Equity
investmentBody: >-
  Quality hardscaping is one of the most visible and valuable upgrades for any 
  estate. In Dallas, where outdoor living is a year-round priority, professionally 
  installed pavers provide a maintenance-low, high-impact return on investment 
  that significantly differentiates your property in the luxury market.
investmentImage: pavers_investment.avif
servicesTitle: Hardscape Design Solutions
servicesItems:
  - title: Pool Deck Transitions
    body:
      - type: paragraph
        children:
          - text: >-
              Seamless transitions between water and land, utilizing non-slip, 
              heat-reflective stones that stay comfortable under the Texas sun.
  - title: Driveway Masterpieces
    body:
      - type: paragraph
        children:
          - text: >-
              High-load capacity pavers designed for both durability and 
              architectural scale, creating a grand entrance for your estate.
  - title: Garden Path & Patio Grids
    body:
      - type: paragraph
        children:
          - text: >-
              Minimalist grids of large-format stone that guide the eye and 
              physical movement through your outdoor sanctuary.
featuresTitle: Technical Surface Excellence
features:
  - title: Expansion-Proof Engineering
    body:
      - type: paragraph
        children:
          - text: >-
              Our sub-base designs account for the shifting nature of Dallas 
              clay, preventing cracking and sinking even during extreme 
              weather cycles.
  - title: High-Performance Drainage
    body:
      - type: paragraph
        children:
          - text: >-
              Integrated drainage systems that are hidden from view, preventing 
              water pooling and protecting the structural integrity of the 
              hardscape and foundation.
  - title: Slip-Resistant Textures
    body:
      - type: paragraph
        children:
          - text: >-
              We source materials with high friction coefficients for pool 
              surrounds, ensuring safety without sacrificing architectural elegance.
  - title: UV & Thermal Resistance
    body:
      - type: paragraph
        children:
          - text: >-
              Light-colored, low-absorption stones that stay cool to the touch 
              during 100° Dallas days, enhancing the comfort of your pool environment.
  - title: Precision Jointing
    body:
      - type: paragraph
        children:
          - text: >-
              We utilize high-quality polymeric sands and sealants that prevent 
              weed growth and maintain clean lines for years to come.
  - title: Vertical Surface Integration
    body:
      - type: paragraph
        children:
          - text: >-
              We coordinate paver patterns with retaining walls and vertical 
              masonry, creating a unified architectural palette.
standardsTitle: Standards of Integrity
standards:
  - title: Lifetime Structural Warranty
    body:
      - type: paragraph
        children:
          - text: >-
              Our hardscape installations include comprehensive structural 
              warranties, reflecting our confidence in our technical sub-base 
              engineering.
  - title: Quality Material Handoff
    body:
      - type: paragraph
        children:
          - text: >-
              We provide a detailed catalog of the stones used and guidance on 
              post-installation care to maintain the surface’s pristine 
              condition.
ctaTitle: Define Your Terrain
ctaBody: >-
  Connect with our studio to begin designing your custom hardscape. Our 
  specialists will provide a site survey and material consultation tailored to your 
  estate’s architecture.
ctaImage: pavers_cta.avif
