overviewTitle: The Epicurean Standard
overviewBody: [{ "type": "paragraph", "children": [{ "text": "AquaVida transforms your backyard into a master-class entertaining environment. We specialize in custom culinary suites that combine architectural masonry with pro-series appliances. Every installation is engineered to withstand the North Texas climate while providing a seamless transition from your internal grill to a gourmet alfresco paradise." }] }]
overviewImage: 'outdoor_kitchen_overview.avif'
processTitle: The Culinary Workflow
processSteps:
  - title: Gourmet Site Design
    body: [{ "type": "paragraph", "children": [{ "text": "We map your outdoor space to optimize workflow, appliance placement, and service access. Our designers help you select textures and utilities that harmonize with your existing architecture." }] }]
  - title: Masonry & Framework
    body: [{ "type": "paragraph", "children": [{ "text": "Our master masons construct custom bases using natural stone, architectural concrete, or premium stucco. Every structure is built with reinforced internal framing for decade-long durability." }] }]
  - title: Utility & Appliance Set
    body: [{ "type": "paragraph", "children": [{ "text": "Technicians handle all precision gas, plumbing, and electrical integrations. We execute the final appliance fitting and surface polishing to meet manufacturer tolerances." }] }]
investmentTitle: Investing in Lifestyle Capital
investmentBody: "A custom outdoor grill is more than a utility; it\u2019s a high-yield property upgrade. We utilize granite, 304 stainless steel, and marine-grade polymers to ensure your investment maintains its aesthetic and functional value. Our design process ensures that your culinary station is scaled correctly to your property, maximizing ROI and entertaining capacity."
investmentImage: /images/services/outdoor_kitchen_investment.avif
servicesTitle: Bespoke Culinary Services
servicesItems:
  - title: Full Culinary Suite Installation
    body: [{ "type": "paragraph", "children": [{ "text": "From simple grill stations to full-scale outdoor grills featuring smokers, pizza ovens, wine cooling, and prep zones \\u2014 all executed with technical precision." }] }]
  - title: Professional Restoration
    body: [{ "type": "paragraph", "children": [{ "text": "High-end structural repair and service for existing outdoor grills. We recalibrate systems, replace failing masonry, and upgrade internal utilities to modern safety standards." }] }]
  - title: Prestige Maintenance Plans
    body: [{ "type": "paragraph", "children": [{ "text": "Structured care programs designed to keep your appliances in showroom condition year-round, including specialized deep cleans and preventative system checks." }] }]
featuresTitle: The Alfresco Masterclass
features:
  - title: Chef-Grade Hardware
    body: [{ "type": "paragraph", "children": [{ "text": "Pro-series thermal grills, ceramic smokers, and custom pizza ovens\\u2014the same equipment professional chefs rely on, integrated into your backyard." }] }]
  - title: Elite Materials
    body: [{ "type": "paragraph", "children": [{ "text": "Marine-grade 316 stainless steel and weather-stable polymers engineered to deny the Dallas sun, rain, and humidity\\u2014no warping, no compromise." }] }]
  - title: Poreless Surfaces
    body: [{ "type": "paragraph", "children": [{ "text": "Exotic granite and high-density sintered stone that defy stains and heat\\u2014countertops that maintain a perpetual glow under sunlight." }] }]
  - title: Intelligent Controls
    body: [{ "type": "paragraph", "children": [{ "text": "Subtle task lighting, integrated USB ports, and Wi-fi enabled appliance management bring modern digital convenience to your flame-fired space." }] }]
  - title: Atmospheric Balance
    body: [{ "type": "paragraph", "children": [{ "text": "Optimized ventilation and airflow dynamics ensure heat and smoke are managed effectively, maintaining Guest comfort even during peak use." }] }]
  - title: Architectural Unity
    body: [{ "type": "paragraph", "children": [{ "text": "Every grill exterior is matched to your home\\u2019s specific material palette\\u2014creating a cohesive, high-fashion look from deck to door." }] }]
standardsTitle: Technical Compliance
standards:
  - title: Safety & Code Integrity
    body: [{ "type": "paragraph", "children": [{ "text": "Every project meets City of Dallas fire safety and building codes, ensuring proper gas clearances, ventilation, and weather-proof electrical circuits." }] }]
  - title: Manufacturer Hand-Off
    body: [{ "type": "paragraph", "children": [{ "text": "We provide full technical walkthroughs for all new hardware, ensuring you understand the performance parameters and care requirements of your new professional gear." }] }]
