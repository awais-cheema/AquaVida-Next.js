slug: fire-pit
accentColor: '#e07a5f'
accentRgb: 224,122,95
heroLabel: Outdoor Living — AquaVida Fire Features
heroTitle: Liquid Light.
heroHighlight: Eternal Warmth.
heroBody:
  - type: paragraph
    children:
      - text: >-
          Transcend the standard backyard fire. We engineer sculptural fire
          features that integrate seamless gas technology with modernist
          brutalism — creating the ultimate nocturnal focal point for your
          Dallas estate.
heroImage: fire_pit_hero.avif
overviewTitle: The Architecture of Fire
overviewBody:
  - type: paragraph
    children:
      - text: >-
          At AquaVida, we view fire as a structural element. Our custom fire pits
          and linear burners are designed to interact with water and stone,
          providing a warm architectural anchor to your outdoor space. From
          sunken lounges with integrated flame tables to monumental stone hearths, 
          we craft environments that invite conversation and endure the elements.
overviewImage: fire_pit_overview.avif
processTitle: Igniting the Vision
processSteps:
  - title: Visual Conceptualization
    body:
      - type: paragraph
        children:
          - text: >-
              We begin by analyzing the site’s nocturnal dynamics. We design fire
              features that complement your pool’s lighting and the home’s
              architectural silhouette, ensuring visual harmony even when the
              flame is off.
  - title: Gas & Safety Engineering
    body:
      - type: paragraph
        children:
          - text: >-
              Safety is our structural priority. Our certified technicians
              integrate high-performance gas plumbing and automated ignition
              systems that meet rigorous Dallas safety codes while maintaining a
              hidden technical profile.
  - title: Material Craftsmanship
    body:
      - type: paragraph
        children:
          - text: >-
              We utilize premium materials — from hand-poured concrete to natural
              basalt. Every surface is treated to withstand extreme temperatures
              and Texas weather, ensuring a permanent architectural legacy.
investmentTitle: Engineering Longevity
investmentBody: >-
  A custom fire feature is more than an amenity; it's a structural upgrade that
  extends the usability of your outdoor space throughout the year. In the Dallas
  market, high-end fire integrations significantly increase property appeal and
  nocturnal ambiance, providing a distinct return on architectural investment.
investmentImage: fire_pit_investment.avif
servicesTitle: Fire Feature Solutions
servicesItems:
  - title: Sunken Fire Lounges
    body:
      - type: paragraph
        children:
          - text: >-
              Integrated seating areas built into the pool’s structure or
              surround, featuring hidden gas lines and custom drainage for a
              seamless architectural experience.
  - title: Linear Fire Tables
    body:
      - type: paragraph
        children:
          - text: >-
              Modernist stone tables with integrated ribbon burners, designed to
              serve as both a social hub and a visual bridge between dining and
              lounging zones.
  - title: Monumental Hearths
    body:
      - type: paragraph
        children:
          - text: >-
              Free-standing stone structures that provide vertical scale and
              physical warmth, acting as a structural anchor for the entire
              outdoor landscape.
featuresTitle: Technical Fire Excellence
features:
  - title: Automated Ignition
    body:
      - type: paragraph
        children:
          - text: >-
              Full integration with your smart home system, allowing for instant
              ignition and flame height control via mobile or voice commands.
  - title: Electronic Safety Sensors
    body:
      - type: paragraph
        children:
          - text: >-
              Integrated sensors that monitor gas flow and flame status,
              providing automatic shutoff and reliable performance in windy
              Dallas conditions.
  - title: Thermal-Resistant Masonry
    body:
      - type: paragraph
        children:
          - text: >-
              Internal structural engineering using fire-rated materials to
              prevent cracking or heat transfer to surrounding architectural
              elements.
  - title: Custom Media Finishes
    body:
      - type: paragraph
        children:
          - text: >-
              From reflective glass crystals to hand-carved lava stone, we curate
              the internal burner media to match your site’s specific aesthetic
              palette.
  - title: High-Output Burners
    body:
      - type: paragraph
        children:
          - text: >-
              Professionally tuned burner systems that ensure even flame
              distribution and maximum heat output, even on the coldest Texas
              nights.
  - title: Concealed Technical Access
    body:
      - type: paragraph
        children:
          - text: >-
              Smart design of paneling and access points allows for easy
              maintenance without disrupting the clean architectural lines of
              the structure.
standardsTitle: Standards of Warmth
standards:
  - title: Certification & Warranty
    body:
      - type: paragraph
        children:
          - text: >-
              All fire features are installed to national safety standards and
              include comprehensive warranties on both the structural masonry and
              mechanical components.
  - title: Integrated Design Handoff
    body:
      - type: paragraph
        children:
          - text: >-
              We provide full orientation on your new fire feature’s operation
              and maintenance, ensuring you feel confident in managing your new
              architectural anchor.
ctaTitle: Ignite Your Outdoor Legacy
ctaBody: >-
  Connect with our technical design studio to discuss your vision for a custom
  fire feature. We provide feasibility assessments and structural designs tailored
  to your estate.
ctaImage: fire_pit_cta.avif
