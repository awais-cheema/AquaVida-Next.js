faqItems:
  - question: What is the typical investment for a custom pool?
    answer: "Most AquaVida projects range from $85k to $250k+, depending on structural complexity, material selection, and site topography."
  - question: Do you offer full design-build services?
    answer: "Yes, we manage every phase from initial 3D architectural rendering to final stone fabrication and structural start-up."
  - question: How long does a project stay in the design phase?
    answer: "Typically 2-4 weeks, ensuring every detail of the hydraulic and structural plan is perfected before excavation."
