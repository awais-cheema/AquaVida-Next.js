slug: pergola-design
accentColor: '#4f772d'
accentRgb: 79,119,45
heroLabel: Modernist Shade — AquaVida Pergolas
heroTitle: Structure.
heroHighlight: Silhouette.
heroBody:
  - type: paragraph
    children:
      - text: >-
          The architecture of shadow. We engineer custom pergolas and pavillions
          that provide structural shade while framing the horizon — creating 
          refined sanctuaries that define the rhythmic movement of light.
heroImage: pergola_hero.avif
overviewTitle: The Structural Canopy
overviewBody:
  - type: paragraph
    children:
      - text: >-
          At AquaVida, we view pergolas as architectural frames. Our structures 
          are engineered using high-performance materials like marine-grade 
          aluminum, sustainably sourced hardwoods, and precision-cut steel. 
          Each design is tailored to the Dallas sun, providing strategic shade 
          during peak hours while maintaining an open-air connection to the outdoors. 
          From motorized louvers to minimalist beam-and-post silos, we craft 
          shelters that are as resilient as they are visually striking.
overviewImage: pergola_overview.avif
processTitle: Framing the Vision
processSteps:
  - title: Solar Mapping & Orientation
    body:
      - type: paragraph
        children:
          - text: >-
              We begin by analyzing how the sun interacts with your property. We 
              design shade structures that are perfectly oriented to provide 
              maximum comfort during Dallas’s hottest months while allowing for 
              ambient light.
  - title: Technical Engineering
    body:
      - type: paragraph
        children:
          - text: >-
              Our engineers ensure that every structure is wind-rated and 
              structurally sound. We integrate hidden mechanical components 
              for motorized systems and ensure all electrical routing for 
              lighting and heating is concealed.
  - title: Precision Installation
    body:
      - type: paragraph
        children:
          - text: >-
              Our specialized crews hand-assemble every component, ensuring 
              millimeter-precise tolerances and flawless finishes. We 
              prioritize clean, rapid site execution to minimize disruption 
              to your landscape.
investmentTitle: Extending the Season
investmentBody: >-
  A high-end pergola is a structural asset that transforms an exposed patio 
  into a year-round usable room. In the luxury Dallas market, integrated shade 
  is a critical feature for elite homes, providing both physical relief from 
  the elements and a sophisticated architectural focal point that drives 
  property value.
investmentImage: pergola_investment.avif
servicesTitle: Shade Design Solutions
servicesItems:
  - title: Motorized Louvered Roofs
    body:
      - type: paragraph
        children:
          - text: >-
              State-of-the-art aluminum structures with automated louvers that 
              can rotate to provide total sun block or open to the stars, with 
              integrated rain sensors and heating.
  - title: Minimalist Steel Pavillions
    body:
      - type: paragraph
        children:
          - text: >-
              Architectural statement pieces featuring slender steel columns and 
              floating roofs, designed to frame specific site views and provide 
              a modern sanctuary.
  - title: Custom Hardwood Arbors
    body:
      - type: paragraph
        children:
          - text: >-
              Warm, organic structures utilizing Ipe or cedar, designed with 
              technical jointing and precision finishing for a timeless 
              aesthetic.
featuresTitle: Technical Shade Excellence
features:
  - title: Wind-Rated Engineering
    body:
      - type: paragraph
        children:
          - text: >-
              Every structure is designed to meet or exceed local Dallas 
              building codes for wind resistance, ensuring safety and 
              permanence.
  - title: Integrated Gutter Systems
    body:
      - type: paragraph
        children:
          - text: >-
              Hidden drainage within the louvered systems ensures that water is 
              discretely managed even during sudden Texas storms.
  - title: Nocturnal Light Scenes
    body:
      - type: paragraph
        children:
          - text: >-
              We integrate high-end LED lighting directly into the structural 
              beams, creating a refined ambiance for evening entertainment.
  - title: Concealed Mechanicals
    body:
      - type: paragraph
        children:
          - text: >-
              No visible wires or motors. All technical components are hidden 
              within the architectural silhouette of the structure.
  - title: Sustainable Material Sourcing
    body:
      - type: paragraph
        children:
          - text: >-
              We prioritize FSC-certified woods and recyclable aluminum, 
              ensuring your structure is as responsible as it is beautiful.
  - title: Climate Control Integration
    body:
      - type: paragraph
        children:
          - text: >-
              Option for integrated infrared heaters and cooling fans that 
              extend the usability of the space through all seasons.
standardsTitle: Standards of Longevity
standards:
  - title: Structural Finish Warranty
    body:
      - type: paragraph
        children:
          - text: >-
              Our pergolas come with long-term warranties on both the structural 
              integrity and the high-performance finishes, protecting your 
              investment.
  - title: Maintenance Handoff
    body:
      - type: paragraph
        children:
          - text: >-
              We provide full orientation on operating louvered systems and 
              guidance on maintaining the beauty of the materials used.
ctaTitle: Define Your Silhouette
ctaBody: >-
  Connect with our studio to begin designing your custom pergola. Our 
  specialists will provide a site survey and technical design tailored to your 
  estate’s solar profile.
ctaImage: pergola_cta.avif
