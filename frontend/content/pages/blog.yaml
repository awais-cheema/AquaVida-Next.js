faqItems:
  - question: How frequently is the journal updated?
    answer: We publish new architectural insights, material studies, and project case studies bi-weekly.
  - question: Can I submit my AquaVida project for a feature?
    answer: Yes. Please contact your project architect or our media team to arrange a professional site study.
  - question: Are the materials discussed in the journal available for public purchase?
    answer: While we discuss specific materials and technologies, many are sourced through exclusive trade partnerships and are integrated specifically through our build contracts.
