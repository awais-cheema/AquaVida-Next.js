faqItems:
  - question: How are projects selected for the archive?
    answer: >-
      We feature projects that push the boundaries of hydraulic engineering,
      material innovation, and architectural integration. Each entry represents
      a unique structural challenge solved.
  - question: Can I request a custom design based on an archive entry?
    answer: >-
      Absolutely. Our portfolio serves as a catalog of possibilities. While
      every design is bespoke to its site, the principles can be integrated into
      any new project.
  - question: Do you offer private consultations at featured sites?
    answer: >-
      Due to client privacy, we do not offer public tours. However, we maintain
      a small number of Signature Reference sites where private viewings can be
      arranged for serious inquiries.
